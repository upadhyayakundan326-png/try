<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: "Segoe UI", sans-serif;
}

body {
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  min-height: 100vh;
}

/* MAIN CARD */
.all {
  width: 90%;
  max-width: 420px;
  margin: 50px auto;
  padding: 25px;
  background: #020024;
background: radial-gradient(circle, rgba(2, 0, 36, 0.74) 0%, rgba(9, 9, 121, 1) 35%, rgba(0, 0, 0, 0.62) 87%);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

/* HEADING */
.task {
  text-align: center;
  color: #fff;
  font-size: 28px;
  margin-bottom: 10px;
}

/* INPUT SECTION */
.box {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.input {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  outline: none;
  font-size: 15px;
}

/* ADD BUTTON */
.jui {
  padding: 12px 16px;
  border-radius: 10px;
  border: none;
  background: #00c9a7;
  color: white;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.jui:hover {
  background: #00a78d;
  transform: scale(1.05);
}

/* TASK LIST */
.tasklist {
  margin-top: 20px;
  list-style: none;
}

/* EACH TASK */
.tasklist li {
  background: rgba(255,255,255,0.1);
  color: white;
  padding: 12px;
  margin-top: 10px;
  border-radius: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  transition: 0.3s;
}

.tasklist li:hover {
  transform: scale(1.02);
}

/* DELETE BUTTON */
.dlt {
  background: #ff4d4d;
  border: none;
  padding: 6px 10px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.dlt:hover {
  background: #cc0000;
}

/* CLEAR ALL BUTTON */
.clear {
  display: block;
  margin: 25px auto 0;
  padding: 10px 20px;
  border-radius: 10px;
  border: none;
  background: transparent;
  color: white;
  border: 1px solid white;
  cursor: pointer;
  transition: 0.3s;
}

.clear:hover {
  background: white;
  color: black;
}

/* LOADING */
.loading {
  text-align: center;
  color: #fff;
  margin-top: 15px;
  display: none;
  font-size: 16px;
}

/* LOADING DOTS ANIMATION */
.loading::after {
  content: "";
  animation: dots 1.5s infinite;
}

@keyframes dots {
  0% { content: ""; }
  33% { content: "."; }
  66% { content: ".."; }
  100% { content: "..."; }
}

/* 📱 MOBILE RESPONSIVE */
@media (max-width: 480px) {
  .all {
    margin: 20px auto;
    padding: 20px;
  }
  .task {
    font-size: 22px;
  }

  .box {
    flex-direction: column;
  }

  .jui {
    width: 100%;
  }
}


    </style>
</head>

<body><div class="all">
    <h2 class="task"> <em>Goals</em> </h2>
    <hr>
    <div class="box">
    <input type="text" class="input" placeholder="Enter task">
    <button onclick="givetask()" class="jui">ADD</button></div>
    <p class="loading">Loading....</p>
    <ol class="tasklist">
        
        
    </ol>
    <button onclick="clearall()" class="clear">clearAll</button>
</div>
    
</body>
</html>
<script>
    function givetask(){
        let task=document.querySelector(".input")
        let val= task.value
        let loading=document.querySelector(".loading")
           loading.style.display="block"
        if(val.trim() === "") return;
        setTimeout(() => {
           let lines=document.createElement('li')
        lines.innerHTML=`${val}   <button onclick="remove(this)"class="dlt">BTN</button>`
          lines.style.color="white";
        lines.style.marginTop = "20px";
        task.value=""
        let append =document.querySelector(".tasklist").append(lines)
        loading.style.display="none"
        },)}
        

        
        
        
        
        
        
           document.addEventListener("keyup",function(en){
            if(en.key==="Enter"){
                givetask()
            }
            
           })
    
        
    
    function remove(btn){
        btn.parentElement.remove()
        //parentElement.remove() will remove ka li part which is associate with the ul means his lagalagi part
    }
    function clearall(){
        document.querySelector(".tasklist").innerHTML=""
    }
    </script>
