<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

    </style>
</head>


<body>
    <button onclick="loadfunction()" class="btn">Load</button>
      <div class="cont"></div>
</body>
</html>
<script>
          let visible=false;
          function loadfunction(){
           
         let cont=document.querySelector(".cont")
        if(visible){
    cont.innerHTML = ""; 
      visible=false
    
    return;
        
        }
         fetch("https://jsonplaceholder.typicode.com/posts")
         .then((res)=>{
            return res.json()
         })
         .then((data)=>{
               cont.innerHTML = "";
            
            data.forEach(da => {
                let div=document.createElement("div")
             div.className="box"
                div.innerHTML= `<h3>${da.title}</h3>
                              <p>${da.body}</p>`
                  cont.appendChild(div)            
            });

             
                visible=true
            //cont.appendChild(box)
         })
        //cont.appendChild(box)
         

          }
          </script>
