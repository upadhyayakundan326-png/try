
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>YouTube Style Player</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  font-family: Arial;
}

.player {
  width: 700px;
}

video {
  width: 100%;
  border-radius: 10px;
  background: black;
}

.controls {
  display: flex;
  align-items: center;
  margin-top: 8px;
}

button {
  background: none;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  margin-right: 10px;
}

#progress {
  flex: 1;
}

#volume {
  width: 100px;
  margin-left: 10px;
}
</style>
</head>

<body>

<div class="player">
  <video id="video">
    <source src="video.mp4" type="video/mp4">
  </video>

  <div class="controls">
    <button id="play">▶</button>
    <input type="range" id="progress" value="0">
    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
    <button id="full">⛶</button>
  </div>
</div>

<script>
const video = document.getElementById("video");
const play = document.getElementById("play");
const progress = document.getElementById("progress");
const volume = document.getElementById("volume");
const full = document.getElementById("full");

// play / pause
play.onclick = () => {
  if(video.paused) {
    video.play();
    play.innerText = "⏸";
  } else {
    video.pause();
    play.innerText = "▶";
  }
};

// progress update
video.ontimeupdate = () => {
  progress.value = (video.currentTime / video.duration) * 100;
};

// seek
progress.oninput = () => {
  video.currentTime = (progress.value / 100) * video.duration;
};

// volume
volume.oninput = () => {
  video.volume = volume.value;
};

// fullscreen
full.onclick = () => {
  video.requestFullscreen();
};
</script>

</body>
</html>
