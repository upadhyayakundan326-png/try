color:aliceblue;

<body>
    <h2 style="text-align: center;color:white">holiday list</h2>
    <hr>

    <ol class="employee">
        
    </ol>
    <input type="text" id="employeename" placeholder="enter name ">
    <input type="text"id="holiday" placeholder="enter your holiday">
    <br>
    <button class="btn" onclick="showholiday()">holiday</button>

    
</body>

<script>
    function employeedetail(text){
        let lines= document.createElement("li")
        lines.innerText=text
        
        document.querySelector(".employee").append(lines)
    }
    function showholiday(){
        console.log("button clicked")
      let emp=document.querySelector("#employeename").value
      let hol=document.querySelector("#holiday").value
      
      if(emp===""||hol===""){
      console.log("need to fill two")
    alert("fill both")
    return;
      }
      employeedetail(emp+" ---"+hol)
      document.querySelector("#employeename").value=""
      document.querySelector("#holiday").value=""

    }


 
</script>
