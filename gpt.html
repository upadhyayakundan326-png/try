<!DOCTYPE html>
<html lang="en">
<head>
    <title>Typing Visualizer</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        input {
            padding: 10px;
            width: 300px;
        }
        #output {
            margin-top: 20px;
            font-size: 20px;
            color: blue;
        }
    </style>
</head>
<body>

    <h1>Typing Visualizer</h1>

    <input type="text" id="inputBox" placeholder="Type something...">

    <div id="output"></div>

    <script>
        let input = document.getElementById("inputBox");
        let output = document.getElementById("output");

        input.addEventListener("keyup", function (e) {
            
            
            // Show live text
            output.innerText = input.value;

            // Detect Enter
            if (e.key === "Enter") {
                console.log("enter")
            } 

            // Detect Backspace
            if (e.key === "Backspace") {
                console.log("Deleted something");
            }
        });
    </script>

</body>
</html>
