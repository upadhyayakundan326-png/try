<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        
        

        
        

  
  body{
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* NAV */
nav{
    background-color: #ff0000;
    padding: 10px;
    display: flex;
    align-items: center;
}

/* BUTTON */
.btn{
    background: white;
    color: black;
    padding: 8px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

/* SIDEBAR */
.navi{
    position: fixed;
    top: 50px;
    left: -220px;
    width: 100px;
    height: 100vw;
    background: #212121;
    transition: 0.3s;
    padding-top: 60px;
    box-shadow: 2px 0 10px rgba(0,0,0,0.3);
}

/* OPEN STATE */
.navi.active{
    left: 0;
}

/* LIST */
ul{
    list-style: none;
    padding: 0;
}

ul li{
    padding:10px 20px ;
    transition: 0.2s;
}

ul li:hover{
    background:#333;
}

/* LINKS */
a{
    color: white;
    text-decoration: none;
    display: block;
}

/* HOVER EFFECT */
a:hover{
    color: #ff0000;
}
.btnn{
    display: block;
    margin: auto;
    margin-top: 50px;


}
body.dark{
    background-color: black;
}

   </style>
</head>

<body>

    <nav>
        <button class="btn">Menu</button>
        </nav>
        <div class="navi">
        <ul>
           <li><a href="todo.html" target="_blank">todo</a></li>
           <li><a href="portfolio.html" target="_blank">portfolio</A></li>
           <li><a href="index.html" target="_blank">ind</A></li>
           <li><a href="employee.html" target="_blank">emp</A></li>
        </ul>
    </div>
    <button onclick="richa()" class="btnn">DARK</button>

    
    
    
</body>
</html>
<script>
    let btn=document.querySelector(".btn")
     let navi=document.querySelector(".navi")
     
    btn.addEventListener("click",function(e){
      navi.classList.toggle("active")
      
    })
   function richa(){
     document.body.classList.toggle("dark")
   }
</script>
