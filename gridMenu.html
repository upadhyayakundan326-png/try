<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin:0;
            padding:0;
        }
        .container{
            display:grid;
            grid-template-columns: 100px 1fr;
            grid-template-rows: 100px 1fr;
            height:100vh;
            width: 100vw;
        }
        .nav{
            grid-column:1/3;
            color:white;
            background-color: #212121;
            margin-top: 0px;
            display: flex;
            align-items: center;
            
            
        }
        .menu{
            background-color: blue;
            grid-column:1/2;
            grid-row:2/3;
            display:flex;
            gap:10px;
            flex-direction: column;
            padding-top: 10px;
            padding-left: 5px;
            
        }
   .content{
    display:flex;
    justify-content: flex-start;
    align-items: flex-start;
    padding-top: 50px;
    padding-left: 10px;
}


      

.hidden{
   text-align: left;
   display:none;
}
        .footer{
            background-color:#212121;
            grid-column:1/3;
            grid-row: 3/4;
            color:white;
            display:flex;
            padding: 5px;
            align-items:center;
        }
        
       
    </style>
</head>
<body>
<div class="container">
    <div class="nav">Navbar</div>
    <div class="menu">Menu
        <div class="item1">item1</div> 
        <div class="item2">item2</div> 
    </div>
    <div class="content">main content 
        <br>

       
           <p class="hidden">Hey man hows the coding going </p>
        

        </div>
         
    </div>
    <div class="footer">Footer</div>
    
</div>

    
</body>
</html>
<script>
     let item1=document.querySelector(".item1")
     
     let p=document.querySelector(".hidden")
    
     
   item1.addEventListener("click",function(){
         if(p.style.display==="none"){
            p.style.display="block"
         }
         else{
            p.style.display="none"
         }
   })
   document.addEventListener("keyup",function(e){
    console.log(e.key)
    if(e.key==="Enter"){
        p.style.display="block"
    }
    
    }
         
        
    

   


)
       

</script>
